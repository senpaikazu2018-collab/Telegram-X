name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build nasm yasm

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;23.2.8568313"

      - name: Run setup script
        run: |
          chmod +x scripts/setup.sh
          echo -e "\n\n\n\n\n" | scripts/./setup.sh || true

      - name: Build native libraries
        run: |
          cd app/jni
          if [ -f "third_party/libvpx/build.sh" ]; then
            bash third_party/libvpx/build.sh latest
          fi
          if [ -f "third_party/ffmpeg/build.sh" ]; then
            bash third_party/ffmpeg/build.sh latest
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode and save keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/release.keystore

      - name: Create keystore.properties
        run: |
          echo "keystore.file=$HOME/release.keystore" >> keystore.properties
          echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "key.alias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "key.password=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "telegram.api_id=${{ secrets.TELEGRAM_API_ID }}" >> local.properties
          echo "telegram.api_hash=${{ secrets.TELEGRAM_API_HASH }}" >> local.properties

      - name: Build Release APK
        run: ./gradlew assembleLatestUniversalRelease --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-x-universal-release
          path: app/build/outputs/apk/latestUniversal/release/*.apk
          retention-days: 7
