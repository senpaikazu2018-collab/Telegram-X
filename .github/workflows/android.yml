name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run setup script
        run: |
          chmod +x scripts/setup.sh
          echo -e "\n\n\n\n\n" | scripts/./setup.sh || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode and save keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/release.keystore

      - name: Create keystore.properties
        run: |
          echo "keystore.file=$HOME/release.keystore" >> keystore.properties
          echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "key.alias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "key.password=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Build Release APK
        run: ./gradlew assembleUniversalRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-x-universal-release
          path: app/build/outputs/apk/universal/release/*.apk
          retention-days: 7
